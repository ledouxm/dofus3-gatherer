appId: fr.mledoux.dofus3-gatherer
productName: Dofus3 Gatherer
directories:
  output: dist
files:
  - out/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: resources/npcap-installer.exe
    to: npcap-installer.exe
  - from: resources/proto
    to: proto
win:
  target: nsis
defaultArch: x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

publish:
  provider: github
  owner: ledouxm
  repo: dofus3-gatherer
