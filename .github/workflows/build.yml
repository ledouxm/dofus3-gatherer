name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      cdn_url:
        description: "CDN base URL (overrides repository variable)"
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Python setuptools (needed by node-gyp on Python 3.12+)
        run: pip install setuptools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Use workflow input if provided, otherwise fall back to repository variable
          VITE_CDN_BASE_URL: ${{ inputs.cdn_url || vars.VITE_CDN_BASE_URL }}
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dofus3-gatherer
          path: dist/*.exe
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
